# Master Config file to change variables around

MODEL_TYPE: vit   # Model Types available - vit, mae, dinov2, dinov3, openphenom, subcell in some cases
MODEL_PATH: /scr/vidit/helsinki_models/small-dataset-base-model
NUM_GPUS: 1
MODEL_MODE: None
MODEL_SIZE: base

# CHAMMI Benchmark
CHAMMI: True  # Enable CHAMMI benchmark
CHAMMI_IMAGES_PATH: /scr/vidit/Foundation_Models/CHAMMI
CHAMMI_FEATURES_PATH: /scr/vidit/chammi_small_dino_features
CHAMMI_SCORE_PATH: /scr/vidit/helsinki_models/CHAMMI_scores/small-dataset-base-model
CHAMMI_BATCH_SIZE: 8

# HPA Benchmark
HPA: False  # Enable HPA benchmark
HPA_IMAGES_PATH: /path/to/hpa/images
HPA_FEATURES_PATH: /path/to/hpa/Features
HPA_SCORE_PATH: /path/to/hpa/score
HPA_BATCH_SIZE: 16
HPA_NUM_WORKERS: 8

#JUMP-CP Benchmark




#IDR-17 Benchmark
IDR-17: False # Enable/disable IDR-17 benchmark
# Paths and directories used for all rules
IDR_DATA_FOLDER: /scr/data/75ds_test/idr0017
IDR_CACHE: /scr/vidit/cache # location where it will temporarily unzip things
IDR_CROP: 100 # Size of the single cell crop
IDR_RESIZE: 224 # Resized each patch to what
IDR_BATCH_SIZE: 2048
IDR_NUM_WORKERS: 8
IDR_THREADS: 16

# Neuron Features Benchmark
NEURON_FEATURES: False  # Enable Neuron Features benchmark
NEURON_IMAGES_PATH: /scr/vidit/neural_features/
NEURON_FEATURES_PATH: /scr/vidit/neural_features/neuron_feature_extraction
NEURON_SCORE_PATH: /scr/vidit/neural_features/neuron_feature_extraction
NEURON_BATCH_SIZE: 16
NEURON_NUM_WORKERS: 8
