[workspace]
authors = ["John Peters <jgpeters3@wisc.edu>"]
channels = ["conda-forge"]
name = "benchmarks"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda="11.8"

[tasks]

[dependencies]
python = ">=3.11, <3.12"
colorcet = ">=3.1.0,<4"
pyarrow = ">=22.0.0,<23"

[feature.std.pypi-dependencies]
numpy = "==1.26.4"
faiss-gpu-cu12 = ">=1.12.0, <2"

[pypi-dependencies]
torch = { version = "==2.4.1", index = "https://download.pytorch.org/whl/cu118" }
torchvision = { version = "==0.19.1", index = "https://download.pytorch.org/whl/cu118" }
pyyaml = ">=6.0.2, <7"
pandas = ">=2.3.2, <3"
matplotlib = ">=3.10.6, <4"
scikit-image = ">=0.25.2, <0.26"
tqdm = ">=4.67.1, <5"
timm = ">=1.0.19, <2"
transformers = ">=4.56.1, <5"
accelerate = "==1.7.0"
seaborn = ">=0.13.2, <0.14"
scikit-learn = ">=1.7.2, <2"
opencv-python = ">=4.11.0.86, <5"
polars = ">=1.33.1, <2"
snakemake = "==8.16.0"
ipykernel = ">=6.30.1, <7"
gputil = ">=1.4.0, <2"
filelock = ">=3.19.1, <4"
einops = ">=0.8.1, <0.9"
umap-learn = ">=0.5.9.post2, <0.6"
copairs = ">=0.5.2, <0.6"
pycytominer = ">=1.3.0, <2"

[feature.idr.pypi-dependencies]
numpy = "==2.2.6"

[feature.idr.dependencies]
umap-learn = ">=0.5.9.post2,<0.6"

[environments]
default = ["std"]
idr = ["idr"]
